_base: default.yaml

trainset:
  name: mousesis
  root_dir: datasets/MouseSIS
  processed_dir: emos_preprocess
  split: train
  seq_length: 2
  min_pixels: 50

  n_workers: 16
  augmentation:
    resized: [180, 320]
    min_pixels: 50
    max_obj_num: 7
    crop_size: [180, 320]
    random_gray:
      enabled: false

valset:
  n_workers: 8
  augmentation:
    resized: [180, 320]
    enabled: false
    min_pixels: 50
    max_obj_num: 7
    crop_size: [180, 320]
  name: mousesis
  root_dir: datasets/MouseSIS
  processed_dir: emos_preprocess
  split: val
  min_pixels: 50

testset:
  n_workers: 4
  augmentation:
    resized: [180, 320]
    enabled: false
    min_pixels: 50
    max_obj_num: 7
    crop_size: [180, 320]
  name: mousesis
  root_dir: datasets/MouseSIS
  split: test
  min_pixels: 1
  seq_length: 1
  has_ev: true
  event_bins: 5
  event_polarity: true

metric:
  type: IDMos
  names: [mask, iou, bbox] # [mask, iou, coco, bbox]

model:
  batch_size: 16
  encoder: resnet50

  max_obj_num: 7
  decoder_num_queries: 10
  pred_score_thr: 0.1

  loss: [cls, dice, focal, unflow, contrast, bbox, adv_loss_texture, adv_loss_motion, modality_recon] # , bbox
  loss_weights: [1.0, 1.0, 20.0, 0.5, 10.0, 0.01, 1.0, 1.0, 10.0] # , 1.0
  da_gamma: 10.0
  max_steps: 400000
  optimize_D_per_step: 1

training:
  max_steps: 400000
  valid_every_steps: [5000, 2000, 380000]
  lr:
    init_value: 0.0001
    da_lr: 0.00005

log:
  save_ckpt_every_steps: [5000, 2000, 380000]

